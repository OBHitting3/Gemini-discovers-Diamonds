apiVersion: 1

providers:
  - name: Content Shield
    orgId: 1
    folder: Content Shield
    folderUid: content-shield
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
